<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Dartsly</title>
    <script>
      // SPA fallback for GitHub Pages: encode the deep path into the query string
      // so index.html can restore it (see inline script in index.html).
      (function () {
        var pathSegmentsToKeep = 1; // project page: keep "/dartsly"
        var l = window.location;
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            l.pathname
              .split("/")
              .slice(0, 1 + pathSegmentsToKeep)
              .join("/") +
            "/?/" +
            l.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
